version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: waif-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ""  # Set this if you want API key authentication
    networks:
      - waif-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    container_name: waif-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7687:7687"  # Bolt port
      - "7474:7474"  # HTTP port (Neo4j Browser)
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/db/neo4j/exec"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waif-network

  backend:
    build:
      context: ./
      dockerfile: ./backend/Dockerfile
    container_name: waif-backend
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      WS_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - waif-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
qdrant_data:
  
volumes:
  neo4j_data:
  neo4j_logs:

networks:
  waif-network:
    driver: bridge
